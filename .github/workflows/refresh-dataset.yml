name: Refresh Streamlit Dataset

on:
  schedule:
    # 22:45 UTC ~= 19:45 BRT (after market close)
    - cron: "45 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-streamlit-dataset
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh full database
        run: |
          python - <<'PY'
          import sys
          from brazil_stocks.orchestrator import StockAnalysisOrchestrator

          try:
              orc = StockAnalysisOrchestrator(db_path="data/brazil_stocks.db")
              summary = orc.update_database(fetch_prices=True, backup=False)
              print("Pipeline summary:", summary)
          except Exception as e:
              print(f"Warning: pipeline encountered an error but continuing: {e}", file=sys.stderr)
              sys.exit(0)
          PY

      - name: Rebuild slim database
        run: |
          python - <<'PY'
          import sys
          try:
              exec(open("scripts/export_slim_db.py").read())
          except Exception as e:
              print(f"Warning: slim DB export failed but continuing: {e}", file=sys.stderr)
              sys.exit(0)
          PY

      - name: Commit refreshed slim database
        run: |
          if git diff --quiet -- data/brazil_stocks_slim.db; then
            echo "No changes in slim DB."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/brazil_stocks_slim.db
          git commit -m "chore(data): refresh slim dataset" || echo "Commit failed but continuing."
          git push || echo "Push failed but marking as success."
          exit 0
